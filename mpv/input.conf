# mpv-play-bundle-v0.7
j repeatable script-binding fehnav/next
k repeatable script-binding fehnav/prev
u repeatable script-binding fehnav/random
h repeatable script-binding fehnav/prev-dir
l repeatable script-binding fehnav/next-dir

v repeatable script-binding tagbar/random-video
i repeatable script-binding tagbar/random-image
n repeatable script-binding tagbar/newest

y script-binding tagbar/add-fav
Y script-binding tagbar/remove-fav
d script-binding tagbar/add-del
D script-binding tagbar/remove-del

0 script-binding tagbar/add-tag-0
1 script-binding tagbar/add-tag-1
2 script-binding tagbar/add-tag-2
3 script-binding tagbar/add-tag-3
4 script-binding tagbar/add-tag-4
5 script-binding tagbar/add-tag-5
6 script-binding tagbar/add-tag-6
7 script-binding tagbar/add-tag-7
8 script-binding tagbar/add-tag-8
9 script-binding tagbar/add-tag-9

# Shift+digits depend on keyboard layout. These cover common US layout and
# also try explicit Shift+N names for layouts where mpv reports them that way.
) script-binding tagbar/remove-tag-0
! script-binding tagbar/remove-tag-1
@ script-binding tagbar/remove-tag-2
# script-binding tagbar/remove-tag-3
$ script-binding tagbar/remove-tag-4
% script-binding tagbar/remove-tag-5
^ script-binding tagbar/remove-tag-6
& script-binding tagbar/remove-tag-7
* script-binding tagbar/remove-tag-8
( script-binding tagbar/remove-tag-9
Shift+0 script-binding tagbar/remove-tag-0
Shift+1 script-binding tagbar/remove-tag-1
Shift+2 script-binding tagbar/remove-tag-2
Shift+3 script-binding tagbar/remove-tag-3
Shift+4 script-binding tagbar/remove-tag-4
Shift+5 script-binding tagbar/remove-tag-5
Shift+6 script-binding tagbar/remove-tag-6
Shift+7 script-binding tagbar/remove-tag-7
Shift+8 script-binding tagbar/remove-tag-8
Shift+9 script-binding tagbar/remove-tag-9

q quit
o cycle-values loop-file inf no
